name: Run ModXRef Batch

on:
  workflow_dispatch:

jobs:
  run-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          df -h

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download dataset
        run: |
          mkdir -p data
          curl -L "https://cloud.crysys.hu/public.php/dav/files/HAtXFNLSDAJJkQE/?accept=zip" -o data/rootkit-dataset.zip
          ls -lh data/rootkit-dataset.zip

      - name: Run script
        env:
          ZIP_PATH: data/rootkit-dataset.zip
          VOLATILITY_SCRIPT: vol.py
          PLUGIN_PATH: ModXRef
          SYMTABS_PATH: symtabs
          OUTPUT_DIR: volatility_outputs
        run: |
          python run_batch.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: volatility_outputs
          path: volatility_outputs
          if-no-files-found: warn